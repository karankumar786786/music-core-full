<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Music Player — Lyrics Sync</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="app">
        <!-- Background glow -->
        <div class="bg-glow"></div>

        <!-- Player Card -->
        <div class="player-card">
            <!-- Album Art -->
            <div class="album-art">
                <div class="album-gradient"></div>
                <div class="music-icon">♪</div>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <h1 class="song-title">HLS Audio Player</h1>
                <p class="song-artist">Lyrics Sync Test</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn" id="rewindBtn" title="Rewind 10s">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12.5 3C7.81 3 4.01 6.54 3.56 11H1l3.5 4 3.5-4H5.57C6.01 7.65 8.96 5 12.5 5c3.87 0 7 3.13 7 7s-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 12.5 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H11.5z"/></svg>
                </button>
                <button class="control-btn play-btn" id="playBtn" title="Play / Pause">
                    <svg id="playIcon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="forwardBtn" title="Forward 10s">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M11.5 3c4.69 0 8.49 3.54 8.94 8H23l-3.5 4-3.5-4h2.43C18.0 7.65 15.04 5 11.5 5 7.63 5 4.5 8.13 4.5 12s3.13 7 7 7c1.93 0 3.68-.79 4.94-2.06l1.42 1.42A8.954 8.954 0 0 1 11.5 21c-4.97 0-9-4.03-9-9s4.03-9 9-9zm1 5v5l-4.28 2.54-.72-1.21 3.5-2.08V8H12.5z"/></svg>
                </button>
            </div>

            <!-- Quality Selector -->
            <div class="quality-selector">
                <label for="qualitySelect">Quality:</label>
                <select id="qualitySelect">
                    <option value="-1">Auto</option>
                </select>
            </div>
        </div>

        <!-- Lyrics Panel -->
        <div class="lyrics-panel">
            <h2 class="lyrics-heading">Lyrics</h2>
            <div class="lyrics-container" id="lyricsContainer">
                <p class="lyrics-placeholder">Loading lyrics…</p>
            </div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script src="index.js"></script>
</body>
</html>
