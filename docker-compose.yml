version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - music-core-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  music-backend:
    image: oneorg6969/music-backend:latest
    env_file:
      - ./music-backend/.env
    environment:
      - NODE_ENV=production
    networks:
      - music-core-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  audio-processor:
    image: oneorg6969/audio-processor:latest
    env_file:
      - ./audioProcessingServer/.env
    environment:
      - NODE_ENV=production
    networks:
      - music-core-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  recommendation-engine:
    image: oneorg6969/recommendation-engine:latest
    env_file:
      - ./reccomendationEngine/.env
    environment:
      - NODE_ENV=production
    networks:
      - music-core-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  frontend:
    image: oneorg6969/frontend:latest
    networks:
      - music-core-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  admin:
    image: oneorg6969/admin:latest
    networks:
      - music-core-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  caddy_data:
  caddy_config:

networks:
  music-core-network:
    driver: overlay