<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plyr + HLS.js Demo</title>

  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 6px;
    }

    .title { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .artist { font-size: 0.75rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.15em; }

    /* Plyr custom theme */
    .plyr {
      --plyr-color-main: #1ed760;
      --plyr-audio-controls-background: #1a1a1a;
      --plyr-audio-control-color: #aaa;
      --plyr-audio-control-color-hover: #fff;
      --plyr-range-fill-background: #1ed760;
      --plyr-range-thumb-background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    /* Quality Panel */
    .quality-panel {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
    }

    .quality-panel .label { margin-bottom: 12px; }

    .quality-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quality-btn {
      background: #242424;
      border: 1px solid rgba(255,255,255,0.06);
      color: #aaa;
      font-size: 11px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .quality-btn:hover { background: #2e2e2e; color: #fff; }

    .quality-btn.active {
      background: #1ed76015;
      border-color: #1ed760;
      color: #1ed760;
    }

    /* Bitrate indicator */
    .bitrate-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1ed760;
      box-shadow: 0 0 8px #1ed760;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .bitrate-text {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Code box */
    .code-box {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #1ed760;
      line-height: 1.8;
    }

    .code-box .comment { color: #444; }
    .code-box .key { color: #7dd3fc; }
    .code-box .val { color: #fbbf24; }
  </style>
</head>
<body>

<div class="card">

  <div>
    <div class="label">Now Playing</div>
    <div class="title" id="song-title">Loading...</div>
    <div class="artist" id="song-artist">One Melody</div>
  </div>

  <!-- Plyr audio element -->
  <audio id="player" controls crossorigin playsinline></audio>

  <!-- Bitrate -->
  <div class="bitrate-row">
    <div class="dot"></div>
    <div class="bitrate-text" id="bitrate-label">Connecting...</div>
  </div>

  <!-- Quality switcher -->
  <div class="quality-panel">
    <div class="label">Stream Quality</div>
    <div class="quality-grid" id="quality-grid">
      <button class="quality-btn active" data-level="-1">Auto</button>
    </div>
  </div>

  <!-- Code comparison -->
  <div>
    <div class="label">What Plyr gave us</div>
    <div class="code-box">
      <span class="comment">// Plyr handles:</span><br/>
      <span class="key">✅</span> <span class="val">Play / Pause UI</span><br/>
      <span class="key">✅</span> <span class="val">Progress bar</span><br/>
      <span class="key">✅</span> <span class="val">Volume slider</span><br/>
      <span class="key">✅</span> <span class="val">Keyboard shortcuts</span><br/>
      <br/>
      <span class="comment">// Still manual (HLS.js):</span><br/>
      <span class="key">⚠️</span> <span class="val">Quality switching</span><br/>
      <span class="key">⚠️</span> <span class="val">Bitrate detection</span><br/>
      <span class="key">⚠️</span> <span class="val">Error recovery</span><br/>
      <span class="key">⚠️</span> <span class="val">Buffer management</span>
    </div>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>

<script>
  const STREAM_URL = "https://onemelodyproduction.s3.ap-south-1.amazonaws.com/songs/495fd784-ee09-46e9-b67c-42985b166723.67b612e3e5d51b6175bd3dfbccb9c6ae5bb4dd269e87646e9a652c2400b57dd7/master.m3u8";

  const audioEl = document.getElementById("player");
  const bitrateLabel = document.getElementById("bitrate-label");
  const qualityGrid = document.getElementById("quality-grid");
  const songTitle = document.getElementById("song-title");
  const songArtist = document.getElementById("song-artist");

  // Init Plyr
  const plyr = new Plyr("#player", {
    controls: ["play", "progress", "current-time", "duration", "mute", "volume"],
  });

  // Init HLS.js
  const hls = new Hls({
    enableWorker: true,
    maxBufferLength: 20,
    maxMaxBufferLength: 30,
    backBufferLength: 10,
  });

  hls.loadSource(STREAM_URL);
  hls.attachMedia(audioEl);

  // Manifest loaded — build quality buttons
  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
    songTitle.textContent = "Stream Active";
    bitrateLabel.textContent = "Stream ready — press play";

    const levels = data.levels;

    // Sort highest to lowest bitrate
    const sorted = levels
      .map((l, i) => ({ ...l, index: i }))
      .sort((a, b) => b.bitrate - a.bitrate);

    sorted.forEach(({ bitrate, index }) => {
      const kbps = Math.round(bitrate / 1000);
      const label = kbps >= 120 ? `HQ · ${kbps}k` : kbps >= 60 ? `MQ · ${kbps}k` : `LQ · ${kbps}k`;
      const btn = document.createElement("button");
      btn.className = "quality-btn";
      btn.textContent = label;
      btn.dataset.level = index;
      btn.addEventListener("click", () => setQuality(index));
      qualityGrid.appendChild(btn);
    });
  });

  // Track real-time bitrate
  hls.on(Hls.Events.FRAG_CHANGED, (_, data) => {
    const level = hls.levels[data.frag.level];
    if (level) {
      const kbps = Math.round(level.bitrate / 1000);
      bitrateLabel.textContent = `Streaming at ${kbps} kbps`;
    }
  });

  // Error recovery
  hls.on(Hls.Events.ERROR, (_, data) => {
    if (data.fatal) {
      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else hls.destroy();
    }
  });

  // Quality switch handler
  function setQuality(level) {
    hls.currentLevel = level;
    document.querySelectorAll(".quality-btn").forEach(btn => {
      btn.classList.toggle("active", parseInt(btn.dataset.level) === level);
    });
  }

  // Auto button
  document.querySelector('[data-level="-1"]').addEventListener("click", () => {
    hls.currentLevel = -1;
    document.querySelectorAll(".quality-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.level === "-1");
    });
  });
</script>
<script src="https://cdn.example.com/lib.js" crossorigin="anonymous"></script>
</body>
</html>
