name: Build and Push to Docker Hub

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and push'
        required: true
        type: choice
        options:
          - all
          - music-backend
          - audio-processor
          - recommendation-engine
          - frontend
          - admin
      version:
        description: 'Image version tag (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push music-backend
        if: ${{ github.event.inputs.service == 'music-backend' || github.event.inputs.service == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: ./music-backend
          push: true
          tags: |
            oneorg6969/music-backend:${{ github.event.inputs.version }}
            oneorg6969/music-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push audio-processor
        if: ${{ github.event.inputs.service == 'audio-processor' || github.event.inputs.service == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: ./audioProcessingServer
          push: true
          tags: |
            oneorg6969/audio-processor:${{ github.event.inputs.version }}
            oneorg6969/audio-processor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push recommendation-engine
        if: ${{ github.event.inputs.service == 'recommendation-engine' || github.event.inputs.service == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: ./reccomendationEngine
          push: true
          tags: |
            oneorg6969/recommendation-engine:${{ github.event.inputs.version }}
            oneorg6969/recommendation-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: ${{ github.event.inputs.service == 'frontend' || github.event.inputs.service == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: ./music-frontend-web
          push: true
          tags: |
            oneorg6969/frontend:${{ github.event.inputs.version }}
            oneorg6969/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin
        if: ${{ github.event.inputs.service == 'admin' || github.event.inputs.service == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: ./music-backend-admin-web
          push: true
          tags: |
            oneorg6969/admin:${{ github.event.inputs.version }}
            oneorg6969/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
